---
- name: update grub and reboot
  command: update-grub
  listen: update grub and reboot

- name: reboot after grub update
  reboot:
    reboot_timeout: 300
  listen: update grub and reboot

- name: wait for connection after reboot
  wait_for_connection:
    delay: 10
    timeout: 300
  listen: update grub and reboot
